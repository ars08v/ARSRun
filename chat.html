<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARS Chatbot - المساعد الذكي</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; align-items: center; }
        #chat-box { flex: 1; width: 100%; max-width: 500px; overflow-y: auto; padding: 20px; border-bottom: 1px solid #333; }
        .msg { margin-bottom: 15px; padding: 12px; border-radius: 12px; line-height: 1.5; }
        .bot { background: #1a1a1a; border: 1px solid #a450ff; align-self: flex-start; }
        .user { background: #333; align-self: flex-end; }
        .input-area { width: 100%; max-width: 500px; padding: 20px; display: flex; gap: 10px; box-sizing: border-box; }
        input { flex: 1; background: #222; color: #fff; border: 1px solid #a450ff; padding: 12px; border-radius: 10px; }
        button { background: #a450ff; border: none; color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="chat-box">
    <div class="msg bot">أهلاً بك في عالم ARSRun! أنا مساعدك الذكي، كيف يمكنني خدمتك اليوم؟</div>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="اسألني عن الموقع أو أي موضوع آخر...">
    <button onclick="sendMessage()">إرسال</button>
</div>

<script>
    async function sendMessage() {
        const input = document.getElementById('userInput');
        const chatBox = document.getElementById('chat-box');
        const userText = input.value;
        if (!userText) return;

        chatBox.innerHTML += `<div class="msg user">أنت: ${userText}</div>`;
        input.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // الاتصال المباشر بمسار الـ Backend على Vercel
            const response = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: userText })
            });

            const data = await response.json();
            
            // التحقق من وصول الرد وعرضه
            if (data.choices && data.choices.length > 0) {
                const botReply = data.choices[0].message.content;
                chatBox.innerHTML += `<div class="msg bot">${botReply}</div>`;
            } else {
                chatBox.innerHTML += `<div class="msg bot" style="color:red;">حدث خطأ في معالجة الرد.</div>`;
            }
        } catch (error) {
            chatBox.innerHTML += `<div class="msg bot" style="color:red;">عذراً، حدث خطأ في الاتصال بالسيرفر.</div>`;
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
</body>
</html>
