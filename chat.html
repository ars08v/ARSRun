<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARS Chatbot</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; align-items: center; }
        .banner { width: 100%; max-width: 500px; margin-top: 10px; border-radius: 10px; }
        #chat-box { flex: 1; width: 100%; max-width: 500px; overflow-y: auto; padding: 20px; }
        .msg { margin-bottom: 10px; padding: 10px; border-radius: 10px; }
        .bot { background: #1a1a1a; border: 1px solid #a450ff; }
        .user { background: #333; text-align: left; }
        .input-area { width: 100%; max-width: 500px; padding: 20px; display: flex; gap: 10px; }
        input { flex: 1; background: #222; color: #fff; padding: 10px; border-radius: 5px; border: 1px solid #a450ff; }
        button { background: #a450ff; color: white; padding: 10px 20px; border-radius: 5px; border: none; }
    </style>
</head>
<body>
    <img src="assets/ai_banner.png" class="banner" alt="Banner">
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="اكتب هنا...">
        <button onclick="sendMessage()">إرسال</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chat-box');
            const userText = input.value;
            if (!userText) return;

            chatBox.innerHTML += `<div class="msg user">أنت: ${userText}</div>`;
            input.value = '';

            try {
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: userText })
                });

                const data = await response.json();
                
                if (data.choices && data.choices[0]) {
                    chatBox.innerHTML += `<div class="msg bot">${data.choices[0].message.content}</div>`;
                } else {
                    // هذا الجزء يظهر الخطأ الحقيقي كنص واضح
                    const errorDetails = data.error ? (typeof data.error === 'string' ? data.error : JSON.stringify(data.error)) : 'خطأ غير معروف';
                    chatBox.innerHTML += `<div class="msg bot" style="color:red;">خطأ: ${errorDetails}</div>`;
                }
            } catch (err) {
                chatBox.innerHTML += `<div class="msg bot" style="color:red;">فشل الاتصال: ${err.message}</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
