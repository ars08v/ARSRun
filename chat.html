<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد 𝑨𝑹𝑺 الشخصي</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .chat-container { flex: 1; display: flex; flex-direction: column; width: 100%; max-width: 800px; margin: 0 auto; background: #111; }
        .bot-img { width: 100%; height: auto; object-fit: contain; border-radius: 0; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .input-area { padding: 15px; background: #1a1a1a; display: flex; gap: 10px; align-items: center; border-top: 1px solid #333; }
        input { flex: 1; padding: 15px; border-radius: 25px; border: 1px solid #444; background: #222; color: white; outline: none; }
        button { padding: 12px 20px; border-radius: 25px; border: none; background: #a450ff; color: white; cursor: pointer; font-weight: bold; }
        .msg { padding: 12px 18px; border-radius: 18px; max-width: 85%; line-height: 1.5; }
        .user-msg { align-self: flex-end; background: #a450ff; }
        .bot-msg { align-self: flex-start; background: #2a2a2a; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="chat-container">
    <img src="assets/ai_banner.png" alt="ARS" class="bot-img">
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="password" id="api-key-input" placeholder="أدخل مفتاح Groq API الخاص بك هنا (للمرة الأولى فقط)">
        <input type="text" id="user-input" placeholder="أهلاً بك، كيف يمكنني مساعدتك اليوم؟">
        <button onclick="sendMessage()">إرسال</button>
    </div>
</div>

<script>
    async function sendMessage() {
        let input = document.getElementById("user-input").value;
        let apiKey = document.getElementById("api-key-input").value;
        let chatBox = document.getElementById("chat-box");
        
        // حفظ المفتاح في المتصفح إذا تم إدخاله
        if (apiKey) localStorage.setItem('groq_key', apiKey);
        const savedKey = localStorage.getItem('groq_key');

        if (!savedKey) { alert("يرجى إدخال مفتاح الـ API أولاً!"); return; }
        if (!input.trim()) return;

        chatBox.innerHTML += `<p class="msg user-msg">${input}</p>`;
        document.getElementById("user-input").value = "";
        
        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + savedKey },
                body: JSON.stringify({
                    model: "llama-3.1-8b-instant",
                    messages: [{ role: "system", content: "أنت المساعد الشخصي للمطور 𝑨𝑹𝑺. أنت دافئ، لطيف، ومتعاون جداً." }, { role: "user", content: input }]
                })
            });
            const data = await response.json();
            chatBox.innerHTML += `<p class="msg bot-msg">${data.choices[0].message.content}</p>`;
        } catch (e) {
            chatBox.innerHTML += "<p style='color:red;'>خطأ: تأكد من مفتاح الـ API الخاص بك.</p>";
        }
    }
</script>
</body>
</html>
