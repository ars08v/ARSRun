<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-K6CCRWNBG5"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-K6CCRWNBG5');
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARSRun - Official Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .visitor-counter-box {
            text-align: center;
            margin: 10px 0;
            padding: 5px 15px;
            background: #1a1a1a;
            border: 1px solid #a450ff;
            border-radius: 20px;
            display: inline-block;
            color: #a450ff;
            font-size: 14px;
        }
        .active-press { transform: scale(0.95); transition: 0.1s; }
        
        .lib-card, .skill-card, .project-card {
            display: block;
            background: #1a1a1a;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #a450ff;
            text-decoration: none;
            transition: transform 0.3s ease;
        }
        .lib-card:hover, .skill-card:hover, .project-card:hover { transform: scale(1.05); }
        .lib-card img, .skill-card img, .project-card img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
        
        .chat-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #a450ff;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(164, 80, 255, 0.4);
            transition: transform 0.3s ease;
            z-index: 1000;
        }
        .chat-float:hover { transform: scale(1.1); }
    </style>
</head>
<body>
    <div class="stars"></div>
    
    <div style="text-align: center; margin-top: 15px;">
        <div class="visitor-counter-box">
            عدد الزوار: <img src="https://visitor-badge.laobi.icu/badge?page_id=ars08v.ARSRun" style="vertical-align: middle;"/>
        </div>
    </div>

    <nav>
        <a href="#about">عن</a> <a href="#skills">مهارات</a> 
        <a href="#projects">المشاريع</a> <a href="#library">المكتبة</a> <a href="#contact">اتصال</a>
    </nav>

    <section class="hero" id="about">
        <h1>مرحباً، أنا 𝑨𝑹𝑺</h1>
        <p>مطور برامج وتطبيقات عملية وحديثة</p>
        <a href="#projects" class="cta-button">استعرض أعمالي</a>
    </section>

    <section class="skills" id="skills">
        <h2>المهارات</h2>
        <div class="skills-grid">
            <a href="https://www.python.org" target="_blank" class="skill-card"><img src="assets/arsp.png" alt="Python"> <p>Python</p></a>
            <a href="https://termux.dev" target="_blank" class="skill-card"><img src="assets/arso.png" alt="Termux"> <p>Termux</p></a>
            <a href="https://developer.mozilla.org/en-US/docs/Web/JavaScript" target="_blank" class="skill-card"><img src="assets/arsi.png" alt="JS"> <p>JavaScript</p></a>
            <a href="https://developer.mozilla.org/en-US/docs/Web" target="_blank" class="skill-card"><img src="assets/arsu.png" alt="CSS"> <p>CSS/HTML</p></a>
        </div>
    </section>

    <section class="projects" id="projects">
        <h2>المشاريع والأدوات</h2>
        <div class="projects-grid">
            <a href="tool_ars.html" class="project-card"><img src="assets/project1.png" alt="ARS Tool"><p>أداة تحرير الفصول</p></a>
            <a href="https://instagram.com/egresars" target="_blank" class="project-card"><img src="assets/project2.png" alt="Bot"><p>بوت الإشراف</p></a>
        </div>
    </section>

    <section class="content-library" id="library" style="padding: 40px 20px; text-align: center;">
        <h2 style="color: white; margin-bottom: 20px;">المكتبة</h2>
        <div class="library-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; max-width: 600px; margin: 0 auto;">
            <!-- تم تحديث الرابط هنا ليطابق اسم الملف rwaya.html -->
            <a href="rwaya.html" class="lib-card">
                <img src="assets/rwaya.png" alt="Novels">
                <h3 style="color: #a450ff;">الروايات</h3>
            </a>
            <a href="manga_page.html" class="lib-card">
                <img src="assets/manga.png" alt="Manga">
                <h3 style="color: #a450ff;">مانجا ومانهوا</h3>
            </a>
        </div>
    </section>

    <section class="music-section" style="text-align: center; margin: 40px auto; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #a450ff; max-width: 400px;">
        <h3 style="color: #a450ff;">استمع إلى الموسيقى المفضلة</h3>
        <img src="assets/arsmu.png" alt="Music Cover" style="width: 80px; height: 80px; border-radius: 50%; border: 3px solid #a450ff; margin-bottom: 15px;">
        <audio controls style="width: 80%; max-width: 300px; filter: invert(1) hue-rotate(180deg);">
            <source src="assets/music.mp3" type="audio/mpeg">
        </audio>
    </section>

    <footer id="contact">
        <a href="https://instagram.com/s.4ps" target="_blank"><img src="assets/profile.png" alt="Profile" class="profile-img"></a>
        <h2>تواصل معي</h2>
        <a href="https://instagram.com/s.4ps" target="_blank" class="social-link">@s.4ps</a>
    </footer>

    <a href="chat.html" class="chat-float" title="دردش مع مساعد ARS"><span>💬</span></a>

    <script>
        document.querySelectorAll('.lib-card, .skill-card, .project-card').forEach(item => {
            item.addEventListener('mousedown', () => item.classList.add('active-press'));
            item.addEventListener('mouseup', () => item.classList.remove('active-press'));
            item.addEventListener('mouseleave', () => item.classList.remove('active-press'));
        });
    </script>
</body>
</html>
